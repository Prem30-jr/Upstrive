service: upstrive-backend
runtime: node
plan: free
region: oregon
buildCommand: npm install
startCommand: npm start
healthCheckPath: /api/health
envVars:
  - key: PORT
    value: 10000
  - key: NODE_ENV
    value: production
  - key: SUPABASE_URL
    sync: false
  - key: SUPABASE_ANON_KEY
    sync: false
  - key: ADMIN_API_KEY
    sync: false
