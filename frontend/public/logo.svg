<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D47A1"/>
      <stop offset="50%" style="stop-color:#1A73E8"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1A73E8"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A73E8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle (optional, subtle) -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="url(#primaryGrad)" stroke-width="2" opacity="0.1"/>
  
  <!-- Main U shape with upward sweep -->
  <path 
    d="M30 75 
       L30 55 
       Q30 35, 50 35 
       L70 35 
       Q90 35, 90 55 
       L90 75" 
    fill="none" 
    stroke="url(#primaryGrad)" 
    stroke-width="12" 
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#shadow)"
  />
  
  <!-- Upward arrow inside/beside U -->
  <path
    d="M60 85 
       L60 45 
       M48 57 
       L60 45 
       L72 57"
    fill="none"
    stroke="url(#arrowGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Rising accent dots -->
  <circle cx="25" cy="40" r="3" fill="#42A5F5" opacity="0.6"/>
  <circle cx="95" cy="50" r="4" fill="#1A73E8" opacity="0.7"/>
  <circle cx="100" cy="30" r="2.5" fill="#42A5F5" opacity="0.5"/>
  <circle cx="20" cy="25" r="2" fill="#0D47A1" opacity="0.4"/>
</svg>
