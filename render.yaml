# Render Blueprint - Upstrive Backend
# Learn more: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: upstrive-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
